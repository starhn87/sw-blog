name: Reindex search and RAG

on:
  deployment_status:

jobs:
  reindex:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - name: Reindex blog search
        run: |
          response=$(curl -s -X POST https://www.seung-woo.me/api/search/index \
            -H "Content-Type: application/json" \
            -d '{"password": "${{ secrets.ADMIN_PASSWORD }}"}')
          echo "Search: $response"

      - name: Wait for Vectorize propagation
        run: sleep 20

      - name: Reindex RAG chunks
        run: |
          response=$(curl -s -X POST https://www.seung-woo.me/api/chat/index \
            -H "Content-Type: application/json" \
            -d '{"password": "${{ secrets.ADMIN_PASSWORD }}"}')
          echo "RAG: $response"
